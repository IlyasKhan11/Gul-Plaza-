services:
  - type: web
    name: gul-plaza-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        value: postgres-production-9f75.up.railway.app
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: railway
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: wkXJNyTTQryauLqVSiRZbKkpVVvuVBDm
      - key: SKIP_REDIS
        value: "true"
      - key: JWT_SECRET
        value: gul-plaza-secure-jwt-secret-2024-production-change-this
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://gul-plaza-testing.vercel.app/
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: ALLOWED_FILE_TYPES
        value: image/jpeg,image/jpg,image/png,image/webp
      # Cloudinary - Use Railway Environment Variables
      # - key: CLOUDINARY_CLOUD_NAME
      #   value: ddtmhdvce
      # - key: CLOUDINARY_API_KEY
      #   value: your_new_key_here
      # - key: CLOUDINARY_API_SECRET
      #   value: your_new_secret_here
    databases:
      - name: gul-plaza-postgres
        plan: free
        databaseName: gul_plaza_db
        user: postgres
    plan: free

databases:
  - name: gul-plaza-postgres
    plan: free
    databaseName: gul_plaza_db
    user: postgres

  - name: gul-plaza-redis
    plan: free
