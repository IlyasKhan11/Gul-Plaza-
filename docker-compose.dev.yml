version: '3.8'

# Development services only (PostgreSQL + Redis)
# Use this for local development when running backend/frontend locally

services:
  postgres:
    image: postgres:16-alpine
    container_name: gul_plaza_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: gul_plaza_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gul_plaza_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gul_plaza_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gul_plaza_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
  redis_data_dev:
